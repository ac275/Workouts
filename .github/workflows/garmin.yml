name: Garmin sync
on:
  schedule:
    # GitHub cron is UTC-only. Two triggers + a London-time gate below
    # = runs once at ~07:30 UK time all year (GMT and BST).
    - cron: "30 6 * * *"
    - cron: "30 7 * * *"
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Gate to 07:xx UK time (skip the other trigger)
        id: gate
        run: |
          H=$(TZ=Europe/London date +%H)
          echo "London hour: $H"
          if [ "$H" = "07" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=yes" >> "$GITHUB_OUTPUT"
          else
            echo "go=no" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.go == 'yes'
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.go == 'yes'
        with:
          python-version: "3.12"
      - if: steps.gate.outputs.go == 'yes'
        run: pip install garminconnect
      - if: steps.gate.outputs.go == 'yes'
        run: python scripts/garmin_fetch.py
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
      - name: Commit garmin.json
        if: steps.gate.outputs.go == 'yes'
        run: |
          git config user.name "cabin-log-bot"
          git config user.email "actions@users.noreply.github.com"
          git add garmin.json
          git diff --cached --quiet || git commit -m "Garmin sync $(date -u +%F)"
          git push
